<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>That Coffee Company | Checkout</title>
    <link rel="stylesheet" href="css/style.css">

    <script src="js/script.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira+Semi+Condensed:wght@300;500;800&display=swap" rel="stylesheet">

</head>
<body>
    
<!-- HEADER -->
    <header>
        <a href="index.html"><h1 class="saira-semi-condensed-extrabold"> that coffee company </h1> </a>
        <div class="header-icons">
            <a href="cart.html" class="cart-link">
                <span id="cart-badge" style="display: none;">0</span>
                <img src="images/cart.png" alt="Menu" width="40" height="40">
            </a>
            <div class="hamb-trigger" id="hamb-icon">
                <img src="images/hamb.png" alt="Menu" width="40" height="40">
            </div>
        </div>
    </header>

    <nav class="nav-dropdown" id="nav-dropdown">
        <div class="navclose-btn" id="nav-close">✕</div>
        <ul class="saira-semi-condensed-medium">
            <li> <a href="allproducts.html">All Products</a></li>
            <li> <a href="placeholder.html">About</a></li>
            <li> <a href="placeholder.html">Contact Us</a></li>
        </ul>
    </nav>



<!-- CHECKOUT -->

<main class="checkout-wrapper">
    <h1 class="saira-semi-condensed-extrabold">Checkout</h1>
    <form action="confirmation.html" class="checkout-form">
        <div class="input-group">
            <label class="saira-semi-condensed-medium">Full Name *</label> 
            <input type="text" required placeholder="John Smith">
        </div>
        <div class="input-group">
            <label class="saira-semi-condensed-medium">Phone Number *</label> 
            <input type="text" required placeholder="0412345678">
        </div>
        <div class="input-group">
            <label class="saira-semi-condensed-medium">Email Address *</label> 
            <input type="text" required placeholder="JohnSmith1960@aol.com">
        </div>
        <div class="input-group">
            <label class="saira-semi-condensed-medium">Shipping Address *</label> 
            <input type="text" required placeholder="14 Smith St, Melbourne VIC">
        </div>
<br>
        <div class="input-group">
            <label class="saira-semi-condensed-medium">Card Number *</label> 
            <input type="text" required placeholder="12345678">
        </div>
        <div class="input-group">
            <label class="saira-semi-condensed-medium">Expiry *</label> 
            <input type="text" required placeholder="MM/YYYY">
        </div>
        <div class="input-group">
            <label class="saira-semi-condensed-medium">CVC *</label> 
            <input type="text" required placeholder="123">
        </div>
<br>
        <div class="input-group">
            <label class="saira-semi-condensed-medium">Order Notes</label> 
            <textarea placeholder="Any special delivery instructions..."></textarea>
        </div>

        <div class="checkout-bottom">
            <div class="summary-total">
                <span class="saira-semi-condensed-medium">Total Cost:</span>
                <span id="checkout-total" class="saira-semi-condensed-medium">$0.00</span>
            </div>
            <button type="submit" class="checkout-btn saira-semi-condensed-medium">Place Order</button>
        </div>
    </form>
</main>




<!-- FOOTER -->
    <footer>
        <h1 class="saira-semi-condensed-extrabold">that coffee company</h1> 
        <div class="footer-icons">
            <img src="images/email.png" alt="Menu" width="25" height="25">
            <img src="images/send.png" alt="Menu" width="25" height="25">
            <img src="images/phone.png" alt="Menu" width="25" height="25">
        </div> <br>
        <h4 class="saira-semi-condensed-light"> Site designed in 2026 by Alex Clarke for INFO20005 </h4> 
    </footer>

</body>
</html>
